version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:13
    container_name: marketmate-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketmate
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marketmate-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=marketmate
      - SECRET_KEY=your-secret-key-here
    volumes:
      - ./backend:/app

  # React Frontend (Development)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketmate-frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      backend:
        condition: service_started
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1

volumes:
  postgres_data:
