version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: marketmate-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketmate
      POSTGRES_USER: marketmate
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-marketmate_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketmate-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production

volumes:
  postgres_data:
